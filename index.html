<!DOCTYPE html>
<html>

<head>

<title>Quiz</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">


<style>

body{

font-family:Arial,Helvetica,sans-serif;

display:flex;

justify-content:center;
align-items:center;

min-height:100vh;

padding:20px;

background:linear-gradient(135deg,#4facfe,#00f2fe);

}


.box{

width:92%;
max-width:520px;
min-width:280px;

background:white;

padding:32px;

border-radius:22px;

box-shadow:0 20px 50px rgba(0,0,0,.15);

transition:.3s;

}


<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#4facfe,#00f2fe);
padding:20px;
}

.box{
width:100%;
max-width:430px;
background:#fff;
padding:35px;
border-radius:20px;
box-shadow:0 15px 40px rgba(0,0,0,.2);
}

.logo{
text-align:center;
font-size:30px;
font-weight:bold;
color:#2196f3;
margin-bottom:10px;
}

.sub{
text-align:center;
color:#777;
margin-bottom:20px;
}

h2{
text-align:center;
margin-bottom:20px;
}

input{
width:100%;
padding:14px;
margin:10px 0;
border:1px solid #ccc;
border-radius:10px;
font-size:16px;
outline:none;
}

input:focus{
border-color:#2196f3;
box-shadow:0 0 8px rgba(33,150,243,.3);
}

button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:10px;
background:#2196f3;
color:white;
font-size:16px;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#1976d2;
}

.logout{
background:#f44336;
}

.logout:hover{
background:#d32f2f;
}

.answer{
margin:15px 0;
font-size:18px;
}

.answer input{
width:auto;
margin-right:10px;
}

#quiz{
display:none;
}

#msg{
color:red;
text-align:center;
margin-top:10px;
}

#result{
margin-top:20px;
text-align:center;
color:#2196f3;
font-size:22px;
}

@media(max-width:500px){

.box{
padding:25px;
}

.logo{
font-size:24px;
}

}

</style>

</style>


</head>



<body>


<div class="box">

<div class="logo">
Ôn thi qs.
</div>

<div class="sub">
50 cá nhoe.
</div>

<div id="login">


<h2>Đăng nhập</h2>


<input id="user" placeholder="Tài khoản">


<input
id="pass"
type="password"
placeholder="Mật khẩu">


<button onclick="login()">

Đăng nhập

</button>


<p id="msg"></p>


</div>




<div id="quiz">


<h2>
Câu hỏi
</h2>


<p class="question">

Việt Nam thuộc Đông Nam Á?

</p>


<label class="answer">

<input type="radio"
name="q"
value="true">

Đúng

</label>


<br>


<label class="answer">

<input type="radio"
name="q"
value="false">

Sai

</label>


<button onclick="check()">

Kiểm tra
  

</button>
  <button
class="logout"
onclick="logout()">

Đăng xuất

</button>


<h3 id="result"></h3>


</div>



</div>






<script>


let device=

localStorage.device ||

(localStorage.device=
crypto.randomUUID());




async function login(){


let res=

await fetch(
"/login",
{


method:"POST",


headers:{
"Content-Type":"application/json"
},


body:JSON.stringify({

username:user.value,

password:pass.value,

device

})


});



let data=

await res.json();




if(data.ok){

localStorage.user=user.value;

document
.getElementById("login")
.style.display="none";

document
.getElementById("quiz")
.style.display="block";

}

else{


msg.innerHTML=data.msg;


}


}





function check(){


let a=

document.querySelector(
"input[name=q]:checked"
);



result.innerHTML=

a && a.value=="true"

?

"Đúng"

:

"Sai";


}
  async function logout(){

if(localStorage.user){

await fetch("/logout",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

username:localStorage.user

})

});

}

localStorage.removeItem("user");

location.reload();

}
  let timer;

function resetTimer(){

clearTimeout(timer);

timer=setTimeout(()=>{

logout();

},600000);

}

[
"click",
"mousemove",
"keydown",
"scroll",
"touchstart"
].forEach(e=>{

document.addEventListener(e,resetTimer);

});

resetTimer();
  window.addEventListener("pagehide",()=>{

if(!localStorage.user)return;

navigator.sendBeacon(

"/logout",

new Blob(

[

JSON.stringify({

username:localStorage.user

})

],

{

type:"application/json"

}

)

);

});



</script>


</body>
  

</html>
