<!DOCTYPE html>
<html>

<head>

<title>Quiz</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">


<style>

body{

font-family:Arial,Helvetica,sans-serif;

display:flex;

justify-content:center;
align-items:center;

min-height:100vh;

padding:20px;

background:linear-gradient(135deg,#4facfe,#00f2fe);

}


.box{

width:92%;
max-width:520px;
min-width:280px;

background:white;

padding:32px;

border-radius:22px;

box-shadow:0 20px 50px rgba(0,0,0,.15);

transition:.3s;

}


<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#4facfe,#00f2fe);
padding:20px;
}



.logo{
text-align:center;
font-size:30px;
font-weight:bold;
color:#2196f3;
margin-bottom:10px;
}

.sub{
text-align:center;
color:#777;
margin-bottom:20px;
}

h2{
text-align:center;
margin-bottom:20px;
}

input{
width:100%;
padding:14px;
margin:10px 0;
border:1px solid #ccc;
border-radius:10px;
font-size:16px;
outline:none;
}

input:focus{
border-color:#2196f3;
box-shadow:0 0 8px rgba(33,150,243,.3);
}

button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:10px;
background:#2196f3;
color:white;
font-size:16px;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#1976d2;
}

.logout{
background:#f44336;
}

.logout:hover{
background:#d32f2f;
}

.answer{
margin:15px 0;
font-size:18px;
}

.answer input{
width:auto;
margin-right:10px;
}

#quiz{
display:none;
}

#msg{
color:red;
text-align:center;
margin-top:10px;
}

#result{
margin-top:20px;
text-align:center;
color:#2196f3;
font-size:22px;
}
  .statement{

margin:20px 0;

padding:15px;

border:1px solid #ddd;

border-radius:12px;

background:#fafafa;

}

.statement p{

margin-bottom:12px;

font-size:17px;

}

.switch{

position:relative;

display:inline-block;

width:60px;

height:32px;

vertical-align:middle;

}

.switch input{

display:none;

}

.slider{

position:absolute;

cursor:pointer;

top:0;

left:0;

right:0;

bottom:0;

background:#f44336;

transition:.3s;

border-radius:50px;

}

.slider:before{

position:absolute;

content:"";

height:24px;

width:24px;

left:4px;

bottom:4px;

background:white;

transition:.3s;

border-radius:50%;

}

.switch input:checked + .slider{

background:#4caf50;

}

.switch input:checked + .slider:before{

transform:translateX(28px);

}

@media(max-width:500px){

.box{
padding:25px;
}

.logo{
font-size:24px;
}

}
/* ==========================
   Điện thoại
========================== */

@media (max-width:767px){

.box{

width:95%;
padding:24px;

}

.logo{

font-size:28px;

}

input{

padding:16px;
font-size:16px;

}

button{

padding:16px;
font-size:16px;

}

}


/* ==========================
   Tablet
========================== */

@media (min-width:768px) and (max-width:1023px){

.box{

width:80%;
max-width:650px;

}

}


/* ==========================
   Laptop
========================== */

@media (min-width:1024px){

.box{

width:480px;

}

}


/* ==========================
   Màn hình lớn
========================== */

@media (min-width:1440px){

.box{

width:550px;

}

}
  .question-navigation{

    margin-top:25px;

    display:flex;

    gap:12px;

    justify-content:space-between;

    align-items:center;

    flex-wrap:wrap;

}

.nav-button{

    flex:1;

    padding:14px;

    border:none;

    border-radius:10px;

    background:#1976d2;

    color:white;

    cursor:pointer;

    font-size:15px;

    transition:.25s;

}

.nav-button:hover{

    background:#125ea8;

}

.nav-button:disabled{

    background:#bdbdbd;

    cursor:not-allowed;

}

@media(max-width:767px){

.question-navigation{

    flex-direction:column;

}

.nav-button{

    width:100%;

}

}
  .question-modal{

    position:fixed;

    top:0;

    left:0;

    width:100%;

    height:100%;

    background:rgba(0,0,0,.45);

    display:none;

    justify-content:center;

    align-items:center;

    z-index:9999;

}

.question-modal-content{

    width:90%;

    max-width:500px;

    background:white;

    border-radius:18px;

    padding:25px;

}

.question-grid{

    display:grid;

    grid-template-columns:repeat(5,1fr);

    gap:12px;

    margin:20px 0;

}

.question-item{

    width:100%;

    height:50px;

    border:none;

    border-radius:10px;

    background:#eeeeee;

    font-size:16px;

    cursor:pointer;

}

.question-item.current{

    background:#2196f3;

    color:white;

}

.close-question-list{

    width:100%;

}

@media(max-width:767px){

.question-modal-content{

    width:95%;

}

.question-grid{

    grid-template-columns:repeat(4,1fr);

}

}
</style>




</head>



<body>


<div class="box">

<div class="logo">
Ôn thi qs.
</div>

<div class="sub">
50 cá nhoe.
</div>

<div id="login">


<h2>Đăng nhập</h2>


<input id="user" placeholder="Tài khoản">


<input
id="pass"
type="password"
placeholder="Mật khẩu">


<button onclick="login()">

Đăng nhập

</button>


<p id="msg"></p>


</div>




<div id="quiz">


<h2>
Câu hỏi
</h2>


<p class="question">

Đọc các mệnh đề sau và chọn Đúng hoặc Sai.

</p>

<div class="statement">

<p>1. Việt Nam thuộc Đông Nam Á.</p>

<label class="switch">

<input
type="checkbox"
id="s1"
checked>

<span class="slider"></span>

</label>

<span id="t1">Đúng</span>

</div>


<div class="statement">

<p>2. Hà Nội là thủ đô của Việt Nam.</p>

<label class="switch">

<input
type="checkbox"
id="s2"
checked>

<span class="slider"></span>

</label>

<span id="t2">Đúng</span>

</div>


<div class="statement">

<p>3. Việt Nam có 100 tỉnh.</p>

<label class="switch">

<input
type="checkbox"
id="s3"
checked>

<span class="slider"></span>

</label>

<span id="t3">Đúng</span>

</div>


<div class="statement">

<p>4. TP.HCM là thủ đô Việt Nam.</p>

<label class="switch">

<input
type="checkbox"
id="s4"
checked>

<span class="slider"></span>

</label>

<span id="t4">Đúng</span>

</div>


<button onclick="check()">

Kiểm tra
  

</button>
  <button
class="logout"
onclick="logout()">

Đăng xuất

</button>
  <div class="question-navigation">

    <button
    id="prevQuestion"
    class="nav-button">

        ← Câu trước

    </button>

    <button
    id="openQuestionList"
    class="nav-button">

        Danh sách câu hỏi

    </button>

    <button
    id="nextQuestion"
    class="nav-button">

        Câu sau →

    </button>

</div>


<h3 id="result"></h3>


</div>



</div>





<div id="questionModal" class="question-modal">

    <div class="question-modal-content">

        <h2>Danh sách câu hỏi</h2>

        <div id="questionGrid" class="question-grid">

            

        </div>

        <button
        id="closeQuestionList"
        class="close-question-list">

            Đóng

        </button>

    </div>

</div>
<script>


let device=

localStorage.device ||

(localStorage.device=
crypto.randomUUID());




async function login(){


let res=

await fetch(
"/login",
{


method:"POST",


headers:{
"Content-Type":"application/json"
},


body:JSON.stringify({

username:user.value,

password:pass.value,

device

})


});



let data=

await res.json();




if(data.ok){

localStorage.user=user.value;

document
.getElementById("login")
.style.display="none";

document
.getElementById("quiz")
.style.display="block";

}

else{


msg.innerHTML=data.msg;


}


}


for(let i=1;i<=4;i++){

const sw=document.getElementById("s"+i);

const text=document.getElementById("t"+i);

if(sw.checked){

text.innerHTML="Đúng";
text.style.color="#2e7d32";

}else{

text.innerHTML="Sai";
text.style.color="#d32f2f";

}

sw.addEventListener("change",()=>{

if(sw.checked){

text.innerHTML="Đúng";
text.style.color="#2e7d32";

}else{

text.innerHTML="Sai";
text.style.color="#d32f2f";

}

});

}


function check(){

let score=0;

const answer=[

true,

true,

false,

false

];

for(let i=1;i<=4;i++){

const value=

document.getElementById("s"+i).checked;

document.getElementById("t"+i).innerHTML=

value

?

"Đúng"

:

"Sai";

if(value==answer[i-1]){

score++;

}

}

result.innerHTML=

"Bạn đúng "

+

score

+

"/4 mệnh đề.";

}
  async function logout(){

if(localStorage.user){

await fetch("/logout",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

username:localStorage.user

})

});

}

localStorage.removeItem("user");

location.reload();

}
  let timer;

function resetTimer(){

clearTimeout(timer);

timer=setTimeout(()=>{

logout();

},600000);

}

[
"click",
"mousemove",
"keydown",
"scroll",
"touchstart"
].forEach(e=>{

document.addEventListener(e,resetTimer);

});

resetTimer();
  document
.getElementById("openQuestionList")
.addEventListener("click",()=>{

    document
    .getElementById("questionModal")
    .style.display="flex";

});

document
.getElementById("closeQuestionList")
.addEventListener("click",()=>{

    document
    .getElementById("questionModal")
    .style.display="none";

});

document
.getElementById("questionModal")
.addEventListener("click",(event)=>{

    if(event.target.id=="questionModal"){

        document
        .getElementById("questionModal")
        .style.display="none";

    }

});
  const TOTAL_QUESTIONS = 40;

const questionGrid =
document.getElementById("questionGrid");

for(let i = 1; i <= TOTAL_QUESTIONS; i++){

    const button =
    document.createElement("button");

    button.className = "question-item";

    if(i == 1){

        button.classList.add("current");

    }

    button.innerHTML = i;

    button.dataset.question = i;

    questionGrid.appendChild(button);

}
  let currentQuestion = 1;

function updateQuestionNavigation(){

    const buttons =
    document.querySelectorAll(".question-item");

    buttons.forEach(button=>{

        button.classList.remove("current");

        if(Number(button.dataset.question)===currentQuestion){

            button.classList.add("current");

        }

    });

}

document
.querySelectorAll(".question-item")
.forEach(button=>{

    button.addEventListener("click",()=>{

        currentQuestion =
        Number(button.dataset.question);

        updateQuestionNavigation();

        document
        .getElementById("questionModal")
        .style.display="none";

    });

});
  window.addEventListener("pagehide",()=>{

if(!localStorage.user)return;

navigator.sendBeacon(

"/logout",

new Blob(

[

JSON.stringify({

username:localStorage.user

})

],

{

type:"application/json"

}

)

);

});



</script>


</body>
  

</html>
